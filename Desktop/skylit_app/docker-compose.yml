version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: skylit
      POSTGRES_PASSWORD: skylitpass
      POSTGRES_DB: skylitdb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - 8009:8000
    volumes:
      - ./backend:/app

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@skylit.local
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - 8080:80
    depends_on:
      - db

volumes:
  db_data:
  pgadmin_data:
